<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVVO — Dashboard ventas & stock</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#f6f5f1;--card:#fff;--border:#e4e1da;--text:#1a1917;--muted:#807d75;
--accent:#1a6b42;--accent-l:#e4f5ec;--accent2:#c45a2c;--accent2-l:#fdf0ea;
--warn:#b45309;--warn-l:#fef3c7;--danger:#b91c1c;--danger-l:#fee2e2;
--blue:#1d4ed8;--blue-l:#eff6ff;--purple:#6d28d9;--purple-l:#f5f3ff;
--mono:'JetBrains Mono',monospace;
--sh:0 1px 3px rgba(0,0,0,.05);--sh2:0 4px 12px rgba(0,0,0,.07);
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:14px}
::selection{background:var(--accent);color:#fff}

header{background:#18181b;color:#fff;padding:20px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header h1{font-size:20px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
header h1 span{font-size:11px;font-weight:600;background:var(--accent);padding:3px 10px;border-radius:20px;letter-spacing:.5px}
.hdr-meta{font-size:12px;color:#a1a1aa;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.hdr-meta b{color:#e4e4e7}

.wrap{max-width:1360px;margin:0 auto;padding:20px}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.k1::after{background:var(--accent)}.kpi.k2::after{background:var(--blue)}.kpi.k3::after{background:var(--accent2)}.kpi.k4::after{background:var(--purple)}.kpi.k5::after{background:var(--warn)}.kpi.k6::after{background:var(--danger)}
.kpi .kl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.kpi .kv{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-top:2px;font-family:var(--mono)}
.kpi .ks{font-size:11px;color:var(--muted);margin-top:1px}

.filters{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;box-shadow:var(--sh);margin-bottom:18px}
.filters h3{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;align-items:end}
.fg>div>label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:3px}

.ms{position:relative}
.ms-toggle{width:100%;padding:7px 28px 7px 10px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:12px;background:var(--bg);color:var(--text);cursor:pointer;transition:border .15s;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;appearance:none;display:block;position:relative}
.ms-toggle::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--muted)}
.ms-toggle:hover{border-color:#aaa}
.ms-toggle.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,107,66,.1)}
.ms-toggle .cnt{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:4px}
.ms-dd{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--sh2);z-index:100;max-height:320px;overflow:hidden;flex-direction:column;min-width:220px}
.ms-dd.open{display:flex}
.ms-search{border:none;border-bottom:1px solid var(--border);padding:8px 10px;font-family:inherit;font-size:12px;outline:none;background:var(--bg);width:100%}
.ms-list{overflow-y:auto;max-height:260px;padding:4px 0}
.ms-item{display:flex;align-items:center;gap:8px;padding:5px 10px;font-size:12px;cursor:pointer;transition:background .1s}
.ms-item:hover{background:var(--bg)}
.ms-item input[type="checkbox"]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer;flex-shrink:0}
.ms-item label{cursor:pointer;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ms-actions{display:flex;gap:8px;padding:6px 10px;border-top:1px solid var(--border);background:var(--bg);border-radius:0 0 8px 8px}
.ms-actions button{flex:1;padding:4px 8px;border:none;border-radius:5px;font-family:inherit;font-size:11px;cursor:pointer;font-weight:600;transition:all .1s}
.ms-btn-all{background:var(--accent-l);color:var(--accent)}.ms-btn-all:hover{background:var(--accent);color:#fff}
.ms-btn-none{background:var(--danger-l);color:var(--danger)}.ms-btn-none:hover{background:var(--danger);color:#fff}

.fg input[type="text"]{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:12px;background:var(--bg);color:var(--text);transition:border .15s}
.fg input[type="text"]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,107,66,.1)}
.btn-r{background:none;border:1px solid var(--border);border-radius:7px;padding:7px 14px;font-family:inherit;font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s}
.btn-r:hover{background:var(--danger-l);color:var(--danger);border-color:var(--danger)}

.tabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:2px solid var(--border)}
.tab{padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s;font-family:inherit}
.tab:hover{color:var(--text)}.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.cd{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;box-shadow:var(--sh);margin-bottom:18px}
.cd h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.cd h3 i{width:26px;height:26px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-style:normal}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:18px}
@media(max-width:960px){.g2,.g3{grid-template-columns:1fr}}
.tw{overflow-x:auto;max-height:520px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:2}
th{text-align:left;padding:7px 8px;font-weight:700;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.4px;background:var(--card);border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text)}th.r,td.r{text-align:right}
td{padding:6px 8px;border-bottom:1px solid #f0eee8;white-space:nowrap}
tr:hover td{background:#faf9f6}
.rk{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700}
.r1{background:#fef3c7;color:#92400e}.r2{background:#f0efec;color:#57534e}.r3{background:#fed7aa;color:#9a3412}.rn{background:#f5f4f1;color:var(--muted)}
.tg{display:inline-block;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:600}
.tg-c{background:var(--accent-l);color:var(--accent)}.tg-n{background:var(--blue-l);color:var(--blue)}.tg-e{background:var(--warn-l);color:var(--warn)}.tg-a{background:var(--danger-l);color:var(--danger)}.tg-d{background:#f0efec;color:var(--muted)}.tg-p{background:var(--purple-l);color:var(--purple)}
.tg-rnd{display:inline-block;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:600}
.rnd-top{background:#dcfce7;color:#166534}.rnd-alta{background:var(--accent-l);color:var(--accent)}.rnd-media{background:var(--warn-l);color:var(--warn)}.rnd-baja{background:var(--danger-l);color:var(--danger)}.rnd-liq{background:#fce7f3;color:#9d174d}.rnd-agot{background:#f0efec;color:var(--muted)}.rnd-pend{background:var(--blue-l);color:var(--blue)}.rnd-act{background:var(--purple-l);color:var(--purple)}.rnd-tmp{background:#fff7ed;color:#9a3412}
.tu{color:var(--accent);font-weight:700}.td{color:var(--danger);font-weight:700}.tf{color:var(--muted)}
.shb{display:flex;height:6px;border-radius:3px;overflow:hidden;gap:1px;background:#f0efec}.shb div{border-radius:2px}
.al{padding:10px 14px;border-radius:8px;margin-bottom:8px;font-size:12px;line-height:1.4}.al b{display:block;margin-bottom:2px}
.cc{position:relative;height:280px}
.empty{text-align:center;padding:32px;color:var(--muted);font-size:13px}
</style>
</head>

class MultiSelect{
  constructor(el,label,onChange){this.el=el;this.label=label;this.onChange=onChange;this.opts=[];this.sel=new Set;this.isOpen=false;this.build()}
  build(){
    this.el.innerHTML='';
    this.tog=document.createElement('button');this.tog.className='ms-toggle';this.tog.type='button';this.tog.textContent=this.label;
    this.tog.addEventListener('click',e=>{e.stopPropagation();this.toggle()});
    this.dd=document.createElement('div');this.dd.className='ms-dd';this.dd.addEventListener('click',e=>e.stopPropagation());
    this.si=document.createElement('input');this.si.className='ms-search';this.si.type='text';this.si.placeholder='Buscar...';
    this.si.addEventListener('input',()=>this.renderList());
    this.list=document.createElement('div');this.list.className='ms-list';
    const act=document.createElement('div');act.className='ms-actions';
    const bAll=document.createElement('button');bAll.className='ms-btn-all';bAll.textContent='Todos';bAll.addEventListener('click',()=>this.doAll(true));
    const bNone=document.createElement('button');bNone.className='ms-btn-none';bNone.textContent='Ninguno';bNone.addEventListener('click',()=>this.doAll(false));
    act.append(bAll,bNone);this.dd.append(this.si,this.list,act);this.el.append(this.tog,this.dd);
  }
  setOptions(o){
    this.opts=o.sort((a,b)=>a.localeCompare(b));
    const valid=new Set([...this.sel].filter(s=>this.opts.includes(s)));
    const changed=valid.size!==this.sel.size;this.sel=valid;this.renderList();this.updTog();if(changed)this.onChange();
  }
  renderList(){
    const q=this.si.value.toLowerCase();this.list.innerHTML='';
    const vis=q?this.opts.filter(o=>o.toLowerCase().includes(q)):this.opts;
    vis.forEach(opt=>{
      const it=document.createElement('div');it.className='ms-item';
      const cb=document.createElement('input');cb.type='checkbox';cb.checked=this.sel.has(opt);
      const id='cb_'+Math.random().toString(36).slice(2,8);cb.id=id;
      const lb=document.createElement('label');lb.textContent=opt;lb.setAttribute('for',id);
      cb.addEventListener('change',()=>{if(cb.checked)this.sel.add(opt);else this.sel.delete(opt);this.updTog();this.onChange()});
      it.append(cb,lb);this.list.appendChild(it);
    });
  }
  updTog(){
    const n=this.sel.size;
    if(n===0)this.tog.innerHTML=this.label;
    else if(n<=2)this.tog.innerHTML=[...this.sel].join(', ')+` <span class="cnt">${n}</span>`;
    else this.tog.innerHTML=`${n} seleccionados <span class="cnt">${n}</span>`;
  }
  toggle(){this.isOpen=!this.isOpen;this.dd.classList.toggle('open',this.isOpen);this.tog.classList.toggle('active',this.isOpen);if(this.isOpen){this.si.value='';this.renderList();this.si.focus()}}
  close(){this.isOpen=false;this.dd.classList.remove('open');this.tog.classList.remove('active')}
  doAll(add){
    const q=this.si.value.toLowerCase();
    const vis=q?this.opts.filter(o=>o.toLowerCase().includes(q)):this.opts;
    vis.forEach(o=>{if(add)this.sel.add(o);else this.sel.delete(o)});
    if(!add&&!q)this.sel.clear();
    this.renderList();this.updTog();this.onChange();
  }
  getSelected(){return this.sel.size>0?this.sel:null}
  reset(){this.sel.clear();this.updTog();this.si.value=''}
}

  D.forEach(p=>{if(p.fp)s.fp.add(p.fp);if(p.c)s.c.add(p.c);if(p.sc)s.sc.add(p.sc);if(p.e)s.e.add(p.e);if(p.rnd)s.rnd.add(p.rnd);if(p.es)s.es.add(p.es)});
  const mk=(id,lbl,key)=>{if(!msI[id])msI[id]=new MultiSelect(document.getElementById(id),lbl,()=>{updCasc();render()});msI[id].setOptions([...s[key]])};
  mk('msFP','Todas las familias','fp');mk('msC','Todas las categorías','c');mk('msSC','Todas las subcategorías','sc');
  mk('msE','Todos los estados','e');mk('msR','Todos los rendimientos','rnd');mk('msST','Todos los est. stock','es');
  document.getElementById('fQ').oninput=render;
  render();
}

function updCasc(){
  let f=D;const fp=msI['msFP']?.getSelected();if(fp)f=f.filter(p=>fp.has(p.fp));
  const cs=msI['msC']?.getSelected();
  msI['msC']?.setOptions([...new Set((fp?D.filter(p=>fp.has(p.fp)):D).map(p=>p.c).filter(Boolean))]);
  let f2=f;if(cs)f2=f2.filter(p=>cs.has(p.c));
  msI['msSC']?.setOptions([...new Set(f2.map(p=>p.sc).filter(Boolean))]);
}

function gF(){
  let f=D;
  const chk=(id,k)=>{const s=msI[id]?.getSelected();if(s)f=f.filter(p=>s.has(p[k]))};
  chk('msFP','fp');chk('msC','c');chk('msSC','sc');chk('msE','e');chk('msR','rnd');chk('msST','es');
  const q=document.getElementById('fQ').value.toLowerCase().trim();if(q)f=f.filter(p=>p.n.toLowerCase().includes(q));
  return f;
}

function resetAll(){Object.values(msI).forEach(m=>m.reset());document.getElementById('fQ').value='';sortCol=null;init()}
function sp(p,b){P=p;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));b.classList.add('on');sortCol=null;render()}
function N(v){return v.toLocaleString('es-ES')}

function render(){
  const f=gF();document.getElementById('fc').textContent=f.length+' / '+D.length+' productos';
  rKPI(f);rTbl(f);rCh1(f);rCh2(f);rRnd(f);rStk(f);rAl(f);
}

function rKPI(f){
  const tm=f.reduce((s,p)=>s+p.um,0),t3=f.reduce((s,p)=>s+p.u3,0),t6=f.reduce((s,p)=>s+p.u6,0);
  const ts=f.reduce((s,p)=>s+p.stk,0),tt=f.reduce((s,p)=>s+p.trn,0);
  const aV=f.filter(p=>p.alc>0&&p.p3>0);const aA=aV.length?aV.reduce((s,p)=>s+p.alc,0)/aV.length:0;
  const ov=f.filter(p=>p.es==='Overstock').length;
  document.getElementById('kpis').innerHTML=`
    <div class="kpi k1"><div class="kl">Ventas últ. mes</div><div class="kv">${N(tm)}</div><div class="ks">unidades</div></div>
    <div class="kpi k2"><div class="kl">Ventas 3 meses</div><div class="kv">${N(t3)}</div><div class="ks">prom ${N(Math.round(t3/3))}/mes</div></div>
    <div class="kpi k3"><div class="kl">Ventas 6 meses</div><div class="kv">${N(t6)}</div><div class="ks">prom ${N(Math.round(t6/6))}/mes</div></div>
    <div class="kpi k4"><div class="kl">Stock disponible</div><div class="kv">${N(ts)}</div><div class="ks">+ ${N(tt)} en tránsito</div></div>
    <div class="kpi k5"><div class="kl">Alcance medio</div><div class="kv">${aA.toFixed(1)}</div><div class="ks">meses cobertura</div></div>
    <div class="kpi k6"><div class="kl">Overstock</div><div class="kv">${ov}</div><div class="ks">de ${f.length} prods</div></div>`;
}

function rTbl(f){
  let s=[...f];
  if(sortCol){s.sort((a,b)=>{let va=a[sortCol],vb=b[sortCol];if(typeof va==='string')return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);return sortDir==='asc'?va-vb:vb-va})}
  else{s.sort((a,b)=>b[P]-a[P])}
  const top=s.slice(0,80);
  if(!top.length){document.getElementById('tT').innerHTML='<div class="empty">No hay productos</div>';return}
  const cols=[{k:'#',f:null},{k:'Producto',f:'n'},{k:'Subcat.',f:'sc'},{k:'Estado',f:'e'},{k:'Rend.',f:'rnd'},{k:'Mes',f:'um',r:1},{k:'3M',f:'u3',r:1},{k:'P.3M',f:'p3',r:1},{k:'6M',f:'u6',r:1},{k:'P.6M',f:'p6',r:1},{k:'Stock',f:'stk',r:1},{k:'Tráns.',f:'trn',r:1},{k:'Alc.',f:'alc',r:1},{k:'Est.Stk',f:'es'},{k:'Tend.',f:null}];
  let h='<table><thead><tr>';
  cols.forEach(c=>{const cl=c.r?'class="r"':'';const ar=sortCol===c.f?(sortDir==='asc'?' ↑':' ↓'):'';const oc=c.f?` onclick="doSort('${c.f}')"`:'';h+=`<th ${cl}${oc}>${c.k}${ar}</th>`});
  h+='</tr></thead><tbody>';
  top.forEach((p,i)=>{
    const rc=i<1?'r1':i<2?'r2':i<3?'r3':'rn';const rt=p.p6>0?(p.p3/p.p6):0;const tc=rt>1.3?'tu':rt<0.7?'td':'tf';const ti=rt>1.3?'▲':rt<0.7?'▼':'—';
    const tgc=TC[p.e]||'';const rndc=RC[p.rnd]||'';
    const ac=p.alc<2&&p.alc>0?'color:var(--danger);font-weight:700':p.alc<4&&p.alc>0?'color:var(--warn);font-weight:600':'';
    const se=p.es==='Overstock'?'<span style="color:var(--danger);font-weight:600">Over</span>':'<span style="color:var(--accent)">OK</span>';
    h+=`<tr><td><span class="rk ${rc}">${i+1}</span></td><td style="font-weight:500;max-width:260px;overflow:hidden;text-overflow:ellipsis">${p.n}</td><td style="font-size:11px;color:var(--muted);max-width:140px;overflow:hidden;text-overflow:ellipsis">${p.sc}</td><td><span class="tg ${tgc}">${p.e}</span></td><td><span class="tg-rnd ${rndc}">${p.rnd||'—'}</span></td><td class="r" style="font-weight:${P==='um'?700:400};font-family:var(--mono);font-size:11px">${N(p.um)}</td><td class="r" style="font-weight:${P==='u3'?700:400};font-family:var(--mono);font-size:11px">${N(p.u3)}</td><td class="r" style="color:var(--muted);font-family:var(--mono);font-size:11px">${p.p3.toFixed(1)}</td><td class="r" style="font-weight:${P==='u6'?700:400};font-family:var(--mono);font-size:11px">${N(p.u6)}</td><td class="r" style="color:var(--muted);font-family:var(--mono);font-size:11px">${p.p6.toFixed(1)}</td><td class="r" style="font-family:var(--mono);font-size:11px;font-weight:600">${N(p.stk)}</td><td class="r" style="font-family:var(--mono);font-size:11px;color:var(--muted)">${N(p.trn)}</td><td class="r" style="font-family:var(--mono);font-size:11px;${ac}">${p.alc>0?p.alc.toFixed(1):'—'}</td><td>${p.es?se:'—'}</td><td class="${tc}">${ti} ${rt>0?rt.toFixed(1)+'x':''}</td></tr>`;
  });
  h+='</tbody></table>';document.getElementById('tT').innerHTML=h;
}
function doSort(col){if(sortCol===col)sortDir=sortDir==='asc'?'desc':'asc';else{sortCol=col;sortDir='desc'};render()}

function rCh1(f){
  const cats={};f.forEach(p=>{const c=p.c||'Sin cat.';if(!cats[c])cats[c]={um:0,u3:0,u6:0};cats[c].um+=p.um;cats[c].u3+=p.u3;cats[c].u6+=p.u6});
  const s=Object.entries(cats).sort((a,b)=>b[1][P]-a[1][P]).slice(0,12);
  if(C1)C1.destroy();
  C1=new Chart(document.getElementById('ch1'),{type:'bar',data:{labels:s.map(x=>x[0]),datasets:[{data:s.map(x=>x[1][P]),backgroundColor:'#1a6b42',borderRadius:3,barThickness:18}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>N(c.raw)+' uds'}}},scales:{x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{callback:v=>v>=1000?(v/1000)+'k':v}},y:{grid:{display:false},ticks:{font:{size:11}}}}}});
}
function rCh2(f){
  const cats={};f.forEach(p=>{const c=p.c||'Sin cat.';if(!cats[c])cats[c]={stk:0,trn:0,v3:0};cats[c].stk+=p.stk;cats[c].trn+=p.trn;cats[c].v3+=p.u3});
  const s=Object.entries(cats).filter(x=>x[1].stk>0||x[1].v3>0).sort((a,b)=>b[1].stk-a[1].stk).slice(0,12);
  if(C2)C2.destroy();
  C2=new Chart(document.getElementById('ch2'),{type:'bar',data:{labels:s.map(x=>x[0]),datasets:[{label:'Stock',data:s.map(x=>x[1].stk),backgroundColor:'#1d4ed8',borderRadius:3,barThickness:14},{label:'Tránsito',data:s.map(x=>x[1].trn),backgroundColor:'#93c5fd',borderRadius:3,barThickness:14},{label:'Ventas 3M',data:s.map(x=>x[1].v3),backgroundColor:'#f97316',borderRadius:3,barThickness:14}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+N(c.raw)}}},scales:{x:{stacked:false,grid:{color:'rgba(0,0,0,.04)'},ticks:{callback:v=>v>=1000?(v/1000)+'k':v}},y:{grid:{display:false},ticks:{font:{size:11}}}}}});
}
function rRnd(f){
  const r={};f.forEach(p=>{const k=p.rnd||'Sin dato';r[k]=(r[k]||0)+1});const s=Object.entries(r).sort((a,b)=>b[1]-a[1]);const tot=f.length;
  const cols={'Top Ventas':'#166534','Rotación Alta':'#1a6b42','Rotación Media':'#b45309','Rotación Baja':'#b91c1c',Liquidación:'#9d174d',Agotado:'#807d75','Pendiente de activación':'#1d4ed8','Producto activado':'#6d28d9','Fuera de temporada':'#c2410c','Sin dato':'#ccc'};
  let h='<div class="shb" style="margin-bottom:14px">';s.forEach(([k,v])=>{h+=`<div style="flex:${v};background:${cols[k]||'#aaa'}" title="${k}: ${v}"></div>`});h+='</div>';
  s.forEach(([k,v])=>{const pct=tot?Math.round(v/tot*100):0;h+=`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f0eee8;font-size:12px"><div style="width:10px;height:10px;border-radius:3px;background:${cols[k]||'#aaa'};flex-shrink:0"></div><div style="flex:1;font-weight:500">${k}</div><div style="color:var(--muted);font-family:var(--mono);font-size:11px">${v} (${pct}%)</div></div>`});
  document.getElementById('rndS').innerHTML=h;
}
function rStk(f){
  const ts=f.reduce((s,p)=>s+p.stk,0),tt=f.reduce((s,p)=>s+p.trn,0),tso=f.reduce((s,p)=>s+p.sol,0),tb=f.reduce((s,p)=>s+p.bkg,0),tbr=f.reduce((s,p)=>s+p.brr,0);
  const ov=f.filter(p=>p.es==='Overstock'),ok=f.filter(p=>p.es==='Stock ok');
  const cr=f.filter(p=>p.alc>0&&p.alc<2&&p.p3>5),bj=f.filter(p=>p.alc>=2&&p.alc<4&&p.p3>5),ss=f.filter(p=>p.stk<=0&&p.e==='Continuo'&&p.rnd!=='Agotado');
  let h=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px"><div style="background:var(--bg);border-radius:7px;padding:10px 12px"><div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase">Disponible</div><div style="font-size:20px;font-weight:700;font-family:var(--mono)">${N(ts)}</div></div><div style="background:var(--bg);border-radius:7px;padding:10px 12px"><div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase">En tránsito</div><div style="font-size:20px;font-weight:700;font-family:var(--mono)">${N(tt)}</div></div></div>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px"><div style="background:var(--bg);border-radius:7px;padding:8px 10px"><div style="font-size:10px;color:var(--muted);font-weight:600">Solicitado</div><div style="font-size:16px;font-weight:700;font-family:var(--mono)">${N(tso)}</div></div><div style="background:var(--bg);border-radius:7px;padding:8px 10px"><div style="font-size:10px;color:var(--muted);font-weight:600">Booking</div><div style="font-size:16px;font-weight:700;font-family:var(--mono)">${N(tb)}</div></div><div style="background:var(--bg);border-radius:7px;padding:8px 10px"><div style="font-size:10px;color:var(--muted);font-weight:600">Borrador</div><div style="font-size:16px;font-weight:700;font-family:var(--mono)">${N(tbr)}</div></div></div>`;
  h+=`<div class="shb" style="margin-bottom:10px"><div style="flex:${ok.length};background:var(--accent)"></div><div style="flex:${ov.length};background:var(--danger)"></div></div>`;
  h+=`<div style="display:flex;gap:16px;font-size:12px;margin-bottom:10px"><span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:var(--accent)"></span>OK: ${ok.length}</span><span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:var(--danger)"></span>Over: ${ov.length}</span></div>`;
  if(cr.length)h+=`<div style="font-size:11px;color:var(--danger);font-weight:600;margin-top:8px">⚠ ${cr.length} alcance crítico (<2 meses)</div>`;
  if(bj.length)h+=`<div style="font-size:11px;color:var(--warn);font-weight:600;margin-top:4px">⚡ ${bj.length} alcance bajo (2-4 meses)</div>`;
  if(ss.length)h+=`<div style="font-size:11px;color:var(--muted);margin-top:4px">${ss.length} continuos sin stock</div>`;
  document.getElementById('stkS').innerHTML=h;
}
function rAl(f){
  const sinV=f.filter(p=>p.u6<=0&&!['Novedad','Descatalogado','Próximo lanzamiento'].includes(p.e));
  const at=f.filter(p=>p.e==='Atascado'),cy=f.filter(p=>p.p6>=10&&p.p3/p.p6<0.3);
  const neg=f.filter(p=>p.um<0||p.u3<0),ovB=f.filter(p=>p.es==='Overstock'&&p.p3<2&&p.stk>50);
  const ac=f.filter(p=>p.alc>0&&p.alc<2&&p.p3>10);
  let h='';
  if(ac.length)h+=`<div class="al" style="background:var(--danger-l)"><b style="color:var(--danger)">🔴 ${ac.length} cobertura crítica (<2m, prom>10/mes)</b><span style="color:var(--muted)">${ac.slice(0,3).map(p=>p.n).join(', ')}${ac.length>3?'…':''}</span></div>`;
  if(ovB.length)h+=`<div class="al" style="background:var(--purple-l)"><b style="color:var(--purple)">🟣 ${ovB.length} overstock baja rotación</b><span style="color:var(--muted)">${ovB.slice(0,3).map(p=>p.n+' ('+p.stk+')').join(', ')}${ovB.length>3?'…':''}</span></div>`;
  if(at.length)h+=`<div class="al" style="background:var(--warn-l)"><b style="color:var(--warn)">🟡 ${at.length} atascados</b><span style="color:var(--muted)">${at.slice(0,3).map(p=>p.n).join(', ')}${at.length>3?'…':''}</span></div>`;
  if(cy.length)h+=`<div class="al" style="background:var(--accent2-l)"><b style="color:var(--accent2)">🟠 ${cy.length} en fuerte caída</b><span style="color:var(--muted)">${cy.slice(0,3).map(p=>p.n).join(', ')}${cy.length>3?'…':''}</span></div>`;
  if(sinV.length)h+=`<div class="al" style="background:#f0efec"><b style="color:var(--muted)">⚪ ${sinV.length} sin ventas 6M</b><span style="color:var(--muted)">${sinV.slice(0,3).map(p=>p.n).join(', ')}${sinV.length>3?'…':''}</span></div>`;
  if(neg.length)h+=`<div class="al" style="background:var(--blue-l)"><b style="color:var(--blue)">🔵 ${neg.length} devoluciones netas</b><span style="color:var(--muted)">${neg.slice(0,3).map(p=>p.n).join(', ')}${neg.length>3?'…':''}</span></div>`;
  if(!h)h='<div class="empty">Sin alertas ✓</div>';
  document.getElementById('alrt').innerHTML=h;
}
init();
</script>
</body>
</html>
